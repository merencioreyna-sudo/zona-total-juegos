<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zona Total Juegos</title>
  <link rel="stylesheet" href="main.css">
</head>
<body>

<div class="top-bar">
  <div class="logo">ZT</div>
  
  <div class="nav-categories" id="navCategories">
    <button class="cat-btn active" data-cat="todos">🔥 Todos</button>
    <button class="cat-btn" data-cat="carreras">🏎️ Carreras</button>
    <button class="cat-btn" data-cat="combate">👊 Combate</button>
    <button class="cat-btn" data-cat="reflejos">⚡ Reflejos</button>
    <button class="cat-btn" data-cat="puzzles">🧩 Puzzles</button>
    <button class="cat-btn" data-cat="arcade">🎯 Arcade</button>
    <button class="cat-btn" data-cat="accion">🎬 Acción</button>
    <button class="cat-btn" data-cat="deportes">⚽ Deportes</button>
    <button class="cat-btn" data-cat="aventura">🗺️ Aventura</button>
  </div>
  
  <button class="btn-home" onclick="window.location.href='https://merencioreyna-sudo.github.io/zona-total-peliculas/'">🏠 Inicio</button>
  <button class="menu-toggle" id="menuToggle">☰</button>
</div>

<header class="hero">
  <div class="hero-image"></div>
</header>

<section class="recent-games">
  <h2>RECIENTES</h2>
  <div class="recent-grid" id="recentGrid"></div>
</section>

<section class="all-games">
  <h2>TODOS LOS JUEGOS</h2>
  <div class="games-grid" id="gamesGrid"></div>
</section>

<!-- Juego sorpresa rotatorio -->
<section class="surprise-game">
  <h2>🎁 Juego Sorpresa</h2>
  <div id="surpriseGameGrid" class="surprise-grid">
    <div class="game-card">
      <img class="game-image" src="" alt="Cargando juego sorpresa...">
    </div>
  </div>
</section>

<div class="game-player" id="gamePlayer" style="display: none;">
  <button class="close-player" id="closePlayer">✕</button>
  <iframe id="gameFrame" src="" frameborder="0"></iframe>
</div>

<footer class="site-footer">
  <p>&copy; 2026 Zona Total Juegos - Todos los derechos reservados</p>
  <div class="game-counter" id="gameCounter">🎮 Cargando juegos...</div>
</footer>

<script src="main.js"></script>

<!-- Modal de bienvenida -->
<div id="welcomeModal" class="welcome-modal" style="display: none;">
  <div class="welcome-modal-content">
    <span class="welcome-close" id="closeWelcomeModal">&times;</span>
    <h3>🎉 ¡Bienvenido a Zona Total Juegos!</h3>
    <p>Disfruta de los mejores juegos gratis, sin salir de la página.</p>
    <button id="acceptWelcomeBtn">¡A JUGAR!</button>
  </div>
</div>

</body>
</html>
